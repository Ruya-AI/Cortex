version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cortex-postgres
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    ports:
      - "5432:5432"
    volumes:
      - cortex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cortex_pgdata:
