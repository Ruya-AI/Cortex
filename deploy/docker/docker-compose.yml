version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cortex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortex}
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cortex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: cortex-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - CORTEX_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD:-cortex}@postgres:5432/${POSTGRES_DB:-cortex}
      - CORTEX_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORTEX_CORS_ORIGINS=["http://localhost","http://localhost:80","http://frontend"]
    env_file:
      - ../config/${DEPLOY_ENV:-development}/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - cortex_reports:/app/.qa-reports
      - cortex_clones:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: cortex-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  cortex_pgdata:
  cortex_reports:
  cortex_clones:
